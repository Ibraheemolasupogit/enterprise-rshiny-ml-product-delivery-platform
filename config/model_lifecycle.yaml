version: "0.15.1"
description: "Milestone 15.1 provider-neutral model-lifecycle integration configuration."
implementation_status: implemented
enabled: true

provider:
  selected: local
  enabled: true

local:
  provider_label: local_model_lifecycle
  registry_config: config/model_registry.yaml
  governance_config: config/model_governance.yaml

sas_viya:
  enabled: false
  provider_label: real_sas_viya
  base_url: "https://sas-viya.example.local"
  authentication_mode: bearer_token
  project_identifier: "enterprise-rshiny-ml-product-delivery-platform"
  model_repository_identifier: "local-review-repository"
  model_name: long_stay_admission_risk
  readiness_path: "/SASLogon/actuator/health"
  timeout_seconds: 10
  verify_tls: true
  client_id_env: SAS_VIYA_CLIENT_ID
  client_secret_env: SAS_VIYA_CLIENT_SECRET
  access_token_env: SAS_VIYA_ACCESS_TOKEN
  endpoints:
    project_lookup: "/modelRepository/repositories?name={repository_identifier}"
    model_lookup: "/modelRepository/repositories/{repository_id}/models?name={model_name}"
    model_creation: "/modelRepository/repositories/{repository_id}/models"
    model_version_lookup: "/modelRepository/models/{model_id}/versions?registrationFingerprint={registration_fingerprint}"
    model_version_creation: "/modelRepository/models/{model_id}/versions"
    metadata_update: "/modelRepository/models/{model_id}/versions/{version_id}/metadata"
    model_retrieval: "/modelRepository/models/{model_id}"
    model_version_retrieval: "/modelRepository/models/{model_id}/versions/{version_id}"
    current_champion: "/modelRepository/repositories/{repository_id}/champion"
    challenger_listing: "/modelRepository/repositories/{repository_id}/challengers"
    lifecycle_state: "/modelRepository/models/{model_id}/versions/{version_id}/lifecycle"
    approval_update: "/modelRepository/models/{model_id}/versions/{version_id}/approval"
    promotion: "/modelRepository/models/{model_id}/versions/{version_id}/promote"
    champion_assignment: "/modelRepository/repositories/{repository_id}/champion"
    promotion_state: "/modelRepository/models/{model_id}/versions/{version_id}/promotion"

model_package:
  output_path: reports/model_evaluation/model_lifecycle_package.json
  model_config: config/model_training.yaml
  registry_config: config/model_registry.yaml
  governance_config: config/model_governance.yaml
  model_name: long_stay_admission_risk
  registry_version: 1
  report_directory: reports/model_evaluation

registration:
  linkage_path: reports/model_evaluation/lifecycle_registration_linkage.json
  evidence_directory: reports/model_evaluation/lifecycle_registrations
  promotion_evidence_directory: reports/model_evaluation/lifecycle_promotions
  metadata_sync_policy: safe_only
