version: 1
description: "Milestone 7 local FastAPI serving configuration."
implementation_status: implemented
enabled: true

service:
  host: 127.0.0.1
  port: 8000
  environment: local
  title: Enterprise ML Product Scoring API
  api_version: v1

model:
  source: registry
  require_active_model: true
  allow_registered_candidate_for_local_review: false

prediction:
  probability_field: long_stay_probability
  threshold_source: registry
  include_risk_band: true
  include_model_version: true
  include_explanation_summary: true

logging:
  log_predictions: true
  log_input_values: false
  log_identifiers: false
  redact_sensitive_fields: true
  event_log_path: data/monitoring/prediction_events.jsonl

security:
  authentication_mode: local_api_key
  api_key_environment_variable: MODEL_API_KEY
  allow_unauthenticated_health: true
  allow_unauthenticated_metadata: false

cors:
  enabled: true
  allow_credentials: false
  allowed_origins:
    - http://127.0.0.1:3838
    - http://localhost:3838

limits:
  maximum_batch_size: 100
  request_timeout_seconds: 10

risk_bands:
  low:
    minimum: 0.0
    maximum: 0.4
  medium:
    minimum: 0.4
    maximum: 0.75
  high:
    minimum: 0.75
    maximum: 1.0
