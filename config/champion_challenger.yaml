version: 1
description: "Milestone 12 champion-challenger comparison policy."
implementation_status: implemented
enabled: true

comparison:
  primary_metric: pr_auc
  probability_metric: brier_score
  minimum_recall: 0.70

promotion_requirements:
  minimum_pr_auc_improvement: 0.02
  maximum_brier_increase: 0.00
  minimum_balanced_accuracy_improvement: 0.00
  maximum_recall_drop: 0.02
  maximum_specificity_drop: 0.05
  require_reproducibility: true
  require_zero_leakage_violations: true
  require_feature_schema_match: true
  require_fairness_review: true
  require_calibration_review: true

selection:
  prefer_champion_when_differences_are_small: true
  allow_no_recommendation: true
  use_historical_test_set_for_selection: false

decisions:
  allowed:
    - recommend_challenger_for_registration_review
    - retain_champion
    - reject_challenger
    - defer_retraining
    - insufficient_evidence
