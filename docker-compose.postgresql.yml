name: enterprise-rshiny-ml-postgresql

services:
  postgres:
    image: postgres:16.10-bookworm
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-ml_product}"
      POSTGRES_USER: "${POSTGRES_USER:-ml_product}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""
      interval: 5s
      timeout: 5s
      retries: 12
    restart: "no"
    networks:
      - product-postgresql
    security_opt:
      - no-new-privileges:true

networks:
  product-postgresql:
    internal: false
    driver: bridge

volumes:
  postgres-data:
