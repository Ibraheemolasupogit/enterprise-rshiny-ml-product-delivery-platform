name: R Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  r-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4 # v4 release tag; pin to commit SHA after first remote CI baseline.
      - name: Set up R
        uses: r-lib/actions/setup-r@v2 # v2 release tag; CI uses R release when local R 4.6.1 is unavailable.
        with:
          r-version: release
      - name: Restore renv
        uses: r-lib/actions/setup-renv@v2 # v2 release tag; pin to commit SHA after first remote CI baseline.
      - name: Set up Python for API smoke tests
        uses: actions/setup-python@v5 # v5 release tag; pin to commit SHA after first remote CI baseline.
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1 # v1 release tag; pin to commit SHA after first remote CI baseline.
      - name: Validate R lockfile restore
        run: Rscript -e "renv::status()"
      - name: R lint
        run: Rscript -e "lintr::lint_dir('rshiny')"
      - name: R testthat
        run: Rscript -e "testthat::test_dir('rshiny/tests/testthat')"
      - name: Browser-backed Shiny tests
        env:
          NOT_CRAN: "true"
        run: Rscript -e "testthat::test_dir('rshiny/tests/shinytest2')"
      - name: R and FastAPI smoke tests
        env:
          MODEL_API_KEY: placeholder
        run: |
          bash scripts/smoke_test_rshiny_api.sh
          bash scripts/smoke_test_advanced_rshiny_api.sh
      - name: Validate R-Shiny evidence
        run: python scripts/validate_rshiny.py
