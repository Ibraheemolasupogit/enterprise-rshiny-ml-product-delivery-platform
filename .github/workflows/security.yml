name: Security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4 # v4 release tag; pin to commit SHA after first remote CI baseline.
      - name: Set up Python
        uses: actions/setup-python@v5 # v5 release tag; pin to commit SHA after first remote CI baseline.
        with:
          python-version: "3.12"
          cache: pip
      - name: Install security dependencies
        run: python -m pip install -e ".[dev]" bandit pip-audit
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2 # v2 release tag; secrets are blocking.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Python static analysis
        run: bandit -r src scripts -ll
      - name: Python dependency audit
        run: pip-audit --strict
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0 # Fixed release tag; high/critical findings block.
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Generate security summary
        run: python -m ml_product.cli build-release-manifest --config config/release.yaml
