name: Python Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4 # v4 release tag; pin to commit SHA after first remote CI baseline.
      - name: Set up Python
        uses: actions/setup-python@v5 # v5 release tag; pin to commit SHA after first remote CI baseline.
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Build clean-checkout review artefacts
        run: make build-review-artifacts
      - name: Pytest with coverage
        run: python -m pytest --cov=ml_product --cov-report=term-missing --cov-fail-under=75
      - name: Verify synthetic data
        run: python scripts/verify_synthetic_data.py
      - name: Verify database build
        run: python scripts/verify_database_build.py
      - name: Verify feature build
        run: python scripts/verify_feature_build.py
      - name: Verify model build
        run: python scripts/verify_model_build.py
      - name: Verify monitoring
        run: python scripts/verify_monitoring.py
      - name: Verify retraining
        run: python scripts/verify_retraining.py
      - name: Clean generated validation caches
        run: make clean
